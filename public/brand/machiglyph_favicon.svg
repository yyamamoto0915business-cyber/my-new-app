<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 200 200">
  <!-- Rounded square background -->
  <rect x="0" y="0" width="200" height="200" rx="44" fill="#F4F3FA"/>

  <!-- Network icon centered at (100,100) -->
  <g transform="translate(100,100)">

    <!-- Halos -->
    <circle cx="0"   cy="-78" r="14" fill="#8FD44A" opacity="0.13"/>
    <circle cx="68"  cy="39"  r="14" fill="#8FD44A" opacity="0.13"/>
    <circle cx="-68" cy="39"  r="14" fill="#8FD44A" opacity="0.13"/>
    <circle cx="68"  cy="-39" r="14" fill="#4A3F8F" opacity="0.08"/>
    <circle cx="0"   cy="78"  r="14" fill="#4A3F8F" opacity="0.08"/>
    <circle cx="-68" cy="-39" r="14" fill="#4A3F8F" opacity="0.08"/>

    <!-- Outer ring edges -->
    <g stroke="#4A3F8F" stroke-width="2.1" opacity="0.31" stroke-linecap="round">
      <line x1="0"   y1="-78" x2="68"  y2="-39"/>
      <line x1="68"  y1="-39" x2="68"  y2="39"/>
      <line x1="68"  y1="39"  x2="0"   y2="78"/>
      <line x1="0"   y1="78"  x2="-68" y2="39"/>
      <line x1="-68" y1="39"  x2="-68" y2="-39"/>
      <line x1="-68" y1="-39" x2="0"   y2="-78"/>
    </g>

    <!-- YG spokes -->
    <g stroke="#8FD44A" stroke-width="4.0" stroke-linecap="round">
      <line x1="0"   y1="-16" x2="0"   y2="-69"/>
      <line x1="14"  y1="8"   x2="59"  y2="34"/>
      <line x1="-14" y1="8"   x2="-59" y2="34"/>
    </g>

    <!-- Indigo spokes -->
    <g stroke="#4A3F8F" stroke-width="3.28" stroke-linecap="round">
      <line x1="14"  y1="-8"  x2="59"  y2="-39"/>
      <line x1="0"   y1="16"  x2="0"   y2="69"/>
      <line x1="-14" y1="-8"  x2="-59" y2="-39"/>
    </g>

    <!-- YG nodes -->
    <circle cx="0"   cy="-78" r="11" fill="#8FD44A"/>
    <circle cx="0"   cy="-78" r="4.5" fill="#ffffff"/>
    <circle cx="68"  cy="39"  r="11" fill="#8FD44A"/>
    <circle cx="68"  cy="39"  r="4.5" fill="#ffffff"/>
    <circle cx="-68" cy="39"  r="11" fill="#8FD44A"/>
    <circle cx="-68" cy="39"  r="4.5" fill="#ffffff"/>

    <!-- Indigo nodes -->
    <circle cx="68"  cy="-39" r="11" fill="#ffffff" stroke="#4A3F8F" stroke-width="2.5"/>
    <circle cx="68"  cy="-39" r="3.8" fill="#4A3F8F" opacity="0.30"/>
    <circle cx="0"   cy="78"  r="11" fill="#ffffff" stroke="#4A3F8F" stroke-width="2.5"/>
    <circle cx="0"   cy="78"  r="3.8" fill="#4A3F8F" opacity="0.30"/>
    <circle cx="-68" cy="-39" r="11" fill="#ffffff" stroke="#4A3F8F" stroke-width="2.5"/>
    <circle cx="-68" cy="-39" r="3.8" fill="#4A3F8F" opacity="0.30"/>

    <!-- Center node -->
    <circle r="32" fill="#8FD44A" opacity="0.08"/>
    <circle r="23" fill="none" stroke="#8FD44A" stroke-width="1.5" opacity="0.30"/>
    <circle r="17" fill="#ffffff" stroke="#4A3F8F" stroke-width="3.0"/>
    <circle r="6.5" fill="#8FD44A"/>
    <circle r="2.8" fill="#ffffff"/>
  </g>
</svg>
